<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tabelas</title>
</head>
<body>
    <h1>Uso de tabelas</h1>
    <table border="1">
        <tr>
            <th>Título</th>
            <th>Título</th>
            <th>Título</th>
        </tr>
        <tr>
            <td>celula 1 L2</td>
            <td>Celula 2 L2</td>
            <td>Celula 3 L2</td>
        </tr>
        <tr>
            <td>celula 1 L2</td>
            <td>Celula 2 L2</td>
            <td>Celula 3 L2</td>
        </tr>
    </table>
    <br>
    <h2>Mesclar colunas</h2>
    <table border="1" width="300">
        <tr>
            <th colspan="3">Mesclada</th>
        </tr>
        <tr>
            <td>cel</td>
            <td>cel</td>
            <td>cel</td>
        </tr>
        <tr>
            <td>cel</td>
            <td>cel</td>
            <td>cel</td>
        </tr>
    </table>
    <h2>Mesclar Linhas</h2>
    <table border="1">
        <tr bgcolor="red">
            <th rowspan="3">Título</th>
            <th>Titulo</th>
            <th>Título</th>
        </tr>
        <tr>
            <td>cel</td>
            <td>cel</td>
        </tr>
        <tr>
            <td>cel</td>
            <td>cel</td>
        </tr>

    </table>
    <h2>Tabelas HTML 5</h2>
    <table border="1" width="300">
        <caption>Legenda da tabela</caption>
        <tfoot>
            <tr>
                <th>rodape</th>
                <th>rodape</th>
                <th>rodape</th>
            </tr>
        </tfoot>
        <thead>
            <tr>
            <th>tit</th>
            <th>tit</th>
            <th>tit</th>
            </tr>
        </thead>
        
        <tbody>
            <tr>
                <th>body</th>
                <th>body</th>
                <th>body</th>
            </tr>
        </tbody>
    </table>
</body>
</html>
